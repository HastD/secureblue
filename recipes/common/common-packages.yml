type: dnf
source: ghcr.io/blue-build/modules@sha256:a21771c64475511f5d7f8ab98bfb74217658c9958c2b1cb956d9c0bcbbdeed29
install:
  install-weak-deps: false
  packages:
    - hardened_malloc
    - run0edit
    - dnsconfd-unbound

    # missing upstream
    - openssl
    - patch
    - 7zip-standalone-all
    - 7zip
    - distrobox
    - toolbox
    - podman
    - nvme-cli
    - hdparm
    - wireguard-tools
    - gettext
    - rsync
    - steam-devices
    - just

    # signing deps
    - sbsigntools

    # address hardened_malloc incompatibilities
    - no_rlimit_as

    # For use in unprivileged ujust scripts
    - python3-inquirer

    # provenance deps
    - crane
    - slsa-verifier
