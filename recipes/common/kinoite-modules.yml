modules:
  - type: dnf
    source: ghcr.io/blue-build/modules@sha256:36784123debf098c97a9e0686b20ce7a4544f13d2a2584dd8248e3d7eb3c9ea3
    remove:
      packages:
        - kde-connect
        - kde-connect-libs
        - kdeconnectd
        - fedora-chromium-config-kde
        - fedora-flathub-remote
        - fuse-encfs
        - krfb
        - krfb-libs
        - plasma-discover-rpm-ostree

        # depends on fedora-flathub-remote
        - plasma-welcome-fedora
  - type: files
    source: ghcr.io/blue-build/modules@sha256:36784123debf098c97a9e0686b20ce7a4544f13d2a2584dd8248e3d7eb3c9ea3
    files:
      - source: system/kinoite
        destination: /
  - type: justfiles
    source: ghcr.io/blue-build/modules@sha256:36784123debf098c97a9e0686b20ce7a4544f13d2a2584dd8248e3d7eb3c9ea3
    validate: true
    include:
      - kinoite.just
  - type: script
    source: ghcr.io/blue-build/modules@sha256:36784123debf098c97a9e0686b20ce7a4544f13d2a2584dd8248e3d7eb3c9ea3
    scripts:
      - setdefaultkdewallpapers.sh
      - systemsettings-standard-malloc.sh
