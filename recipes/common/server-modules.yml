modules:
  - type: dnf
    source: ghcr.io/blue-build/modules@sha256:a21771c64475511f5d7f8ab98bfb74217658c9958c2b1cb956d9c0bcbbdeed29
    install:
      install-weak-deps: false
      packages:
        - setools-console
        - usbguard
        - firewalld
        - policycoreutils-python-utils

  - type: files
    source: ghcr.io/blue-build/modules@sha256:a21771c64475511f5d7f8ab98bfb74217658c9958c2b1cb956d9c0bcbbdeed29
    files:
      - source: system/server
        destination: /

  - type: script
    source: ghcr.io/blue-build/modules@sha256:a21771c64475511f5d7f8ab98bfb74217658c9958c2b1cb956d9c0bcbbdeed29
    scripts:
      - excludepcsc.sh
      - setserverdefaultzone.sh
      - disable-coreos-migration-motd.sh
      - remove-dns-greenboot-check.sh
