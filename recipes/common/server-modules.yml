    source: ghcr.io/blue-build/modules@sha256:0b74310a559451a6faf9b33f583855dfe5b2cdbe5d90603f2869dd4867c9b485
    install:
      install-weak-deps: false
      packages:
        - setools-console
        - usbguard
        - firewalld
        - policycoreutils-python-utils

  - type: files
