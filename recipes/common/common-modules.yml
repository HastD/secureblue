modules:
  - type: script
    source: ghcr.io/blue-build/modules@sha256:a21771c64475511f5d7f8ab98bfb74217658c9958c2b1cb956d9c0bcbbdeed29
    scripts:
      - removeunusedrepos.sh
      - httpsmirrors.sh
      - unprotectsudo.sh
      # comment/uncomment the line below to disable/enable kernel pinning
      # - installpinnedkernel.sh
      # remove line below once rpm-ostree has been updated to fixed version on all images
      - check-rpm-ostree-version.sh

  - type: files
    source: ghcr.io/blue-build/modules@sha256:a21771c64475511f5d7f8ab98bfb74217658c9958c2b1cb956d9c0bcbbdeed29
    files:
      - source: system/usr
        destination: /usr
      - source: system/etc
        destination: /etc

  - from-file: common/common-packages.yml

  - from-file: common/common-scripts.yml

  - type: justfiles
    source: ghcr.io/blue-build/modules@sha256:a21771c64475511f5d7f8ab98bfb74217658c9958c2b1cb956d9c0bcbbdeed29
    validate: true
    include:
      - common

  - type: script
    source: ghcr.io/blue-build/modules@sha256:a21771c64475511f5d7f8ab98bfb74217658c9958c2b1cb956d9c0bcbbdeed29
    scripts:
      - signkernel.sh
    secrets:
      - type: env
        name: KERNEL_PRIVKEY
        mount:
          type: file
          destination: /tmp/certs/private_key.priv

  - type: secureblue-signing
    source: local
