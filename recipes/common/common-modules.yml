modules:
  - type: script
    source: ghcr.io/blue-build/modules@sha256:0b74310a559451a6faf9b33f583855dfe5b2cdbe5d90603f2869dd4867c9b485
    scripts:
      - removeunusedrepos.sh
      - httpsmirrors.sh
      - unprotectsudo.sh
      # comment/uncomment the line below to disable/enable kernel pinning
      # - installpinnedkernel.sh
      # remove line below once rpm-ostree has been updated to fixed version on all images
      - check-rpm-ostree-version.sh

  - type: files
    source: ghcr.io/blue-build/modules@sha256:0b74310a559451a6faf9b33f583855dfe5b2cdbe5d90603f2869dd4867c9b485
    files:
      - source: system/usr
        destination: /usr
      - source: system/etc
        destination: /etc

  - from-file: common/common-packages.yml

  - from-file: common/common-scripts.yml

  - type: justfiles
    source: ghcr.io/blue-build/modules@sha256:0b74310a559451a6faf9b33f583855dfe5b2cdbe5d90603f2869dd4867c9b485
    validate: true
    include:
      - common

  - type: script
    source: ghcr.io/blue-build/modules@sha256:0b74310a559451a6faf9b33f583855dfe5b2cdbe5d90603f2869dd4867c9b485
    scripts:
      - signkernel.sh
    secrets:
      - type: env
        name: KERNEL_PRIVKEY
        mount:
          type: file
          destination: /tmp/certs/private_key.priv

  - type: secureblue-signing
    source: local
