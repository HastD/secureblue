name: run-tests
permissions: {}
on:
  pull_request:
    branches:
      - live
      - staging
      - next
    paths-ignore:
      - "**.md"
  workflow_dispatch: # allow manually triggering

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  run_tests:
    runs-on: ubuntu-slim
    permissions:
      contents: read
    name: Install Bats and run tests
    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bats and bats libs
        id: setup-bats
        uses: bats-core/bats-action@77d6fb60505b4d0d1d73e48bd035b55074bbfb43 # 4.0.0
        with:
           support-path: "${{ github.workspace }}/.bats/bats-support"
           assert-path: "${{ github.workspace }}/.bats/bats-assert"
           detik-path: "${{ github.workspace }}/.bats/bats-detik"
           file-path: "${{ github.workspace }}/.bats/bats-file"

      - name: Install just
        shell: bash
        run: |
          just_version='1.52.0'
          temp_dir="$(mktemp -d)"
          cd "${temp_dir}"
          just_tarball="just-${just_version}-x86_64-unknown-linux-musl.tar.gz"
          curl -fLsS --retry 5 -O "https://github.com/casey/just/releases/download/${just_version}/${just_tarball}"
          sha256sum -c <<<"e0a712614574d45625332529c864754e26782422b7c7db931466180a618f092d  ${just_tarball}"
          tar -xzf "${just_tarball}"
          sudo install ./just /usr/bin/just

      - name: Run tests
        shell: bash
        env:
          BATS_LIB_PATH: "${{ github.workspace }}/.bats"
        run: |
          bats --timing --trace --verbose-run -r .github/workflows/tests
